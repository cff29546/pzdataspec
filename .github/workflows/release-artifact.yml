name: Release Artifact

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_mode:
        description: "How to publish build outputs"
        required: true
        type: choice
        default: artifact
        options:
          - artifact
          - release
      release_tag:
        description: "Tag to create/update release (required for release)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Kaitai Struct Compiler
        shell: pwsh
        run: |
          $version = "0.11"
          $zip = "kaitai-struct-compiler-$version.zip"
          $url = "https://github.com/kaitai-io/kaitai_struct_compiler/releases/download/$version/$zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP/ksc" -Force
          $kscBat = Get-ChildItem "$env:RUNNER_TEMP/ksc" -Recurse -Filter "kaitai-struct-compiler.bat" | Select-Object -First 1
          if (-not $kscBat) { throw "kaitai-struct-compiler.bat not found after extraction" }
          $binDir = $kscBat.Directory.FullName
          $shim = Join-Path $binDir "ksc.cmd"
          if (-not (Test-Path $shim)) {
            "@echo off`r`ncall `"%~dp0kaitai-struct-compiler.bat`" %*" | Out-File -FilePath $shim -Encoding ascii
          }
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$shim" --version

      - name: Build release artifacts
        shell: cmd
        run: |
          call release.bat

      - name: Setup output tag
        id: output_tag
        shell: pwsh
        run: |
          $pushTag = "$env:GITHUB_REF_NAME"
          if ("$env:GITHUB_REF_TYPE" -eq "tag" -and -not [string]::IsNullOrWhiteSpace($pushTag)) {
            $tag = $pushTag
          } else {
            $tag = "${{ github.event.inputs.release_tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "No tag was resolved. Push a tag (v*) or provide release_tag via workflow_dispatch."
          }

          $releaseDir = "output/release"
          $sourceZip = Join-Path $releaseDir "pzdataspec.zip"
          $targetZip = Join-Path $releaseDir ("pzdataspec-{0}.zip" -f $tag)
          if (-not (Test-Path $sourceZip)) {
            throw "Expected zip not found: $sourceZip"
          }
          if (Test-Path $targetZip) {
            Remove-Item -Path $targetZip -Force
          }
          Move-Item -Path $sourceZip -Destination $targetZip

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload workflow artifact
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'artifact' }}
        uses: actions/upload-artifact@v4
        with:
          name: pzdataspec-release-${{ steps.output_tag.outputs.tag }}
          path: |
            output/release/*.zip
            output/release/release_notes.md
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_mode == 'release') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.output_tag.outputs.tag }}
          files: output/release/*.zip
          body_path: output/release/release_notes.md
          generate_release_notes: false
