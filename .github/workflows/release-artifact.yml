name: Release Artifact

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target: all | latest | world version (e.g. 195)"
        required: false
        default: "latest"
      publish_mode:
        description: "How to publish build outputs"
        required: true
        type: choice
        default: artifact
        options:
          - artifact
          - release
          - both
      release_tag:
        description: "Tag to create/update release (required for release/both, example: v195)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Kaitai Struct Compiler
        shell: pwsh
        run: |
          $version = "0.11"
          $zip = "kaitai-struct-compiler-$version.zip"
          $url = "https://github.com/kaitai-io/kaitai_struct_compiler/releases/download/$version/$zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP/ksc" -Force
          $ksc = Get-ChildItem "$env:RUNNER_TEMP/ksc" -Recurse -Filter "ksc.bat" | Select-Object -First 1
          if (-not $ksc) { throw "ksc.bat not found after extraction" }
          $ksc.Directory.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release artifacts
        shell: cmd
        run: |
          call release.bat ${{ github.event.inputs.target }}

      - name: Validate release inputs
        if: ${{ github.event.inputs.publish_mode == 'release' || github.event.inputs.publish_mode == 'both' }}
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "release_tag is required when publish_mode is 'release' or 'both'."
          }

      - name: Upload workflow artifact
        if: ${{ github.event.inputs.publish_mode == 'artifact' || github.event.inputs.publish_mode == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: pzdataspec-release-${{ github.event.inputs.target }}
          path: |
            output/release/*.zip
            output/release/release_notes.md
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: ${{ github.event.inputs.publish_mode == 'release' || github.event.inputs.publish_mode == 'both' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: output/release/*.zip
          body_path: output/release/release_notes.md
          generate_release_notes: false
